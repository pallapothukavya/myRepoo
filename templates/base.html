{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>WBC Classification Using CNN</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-image: url("{% static 'wbc image.jpeg' %}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: linear-gradient(145deg, rgba(0,0,0,0.85), rgba(20,20,20,0.95));
            backdrop-filter: blur(10px);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 1000;
            box-shadow: 2px 0 20px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        .content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
            min-height: 100vh;
            position: relative;
        }

        .nav-link {
            display: block;
            margin-bottom: 15px;
            color: #fff;
            font-weight: 600;
            padding: 18px 25px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 16px;
            background: linear-gradient(45deg, rgba(255,165,0,0.2), rgba(255,215,0,0.1));
            background-image: url("{% static 'wbc image.jpeg' %}");
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
            border: 2px solid rgba(255,165,0,0.3);
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .nav-link:hover::before {
            left: 100%;
        }

        .nav-link:hover {
            color: #FFD700;
            background: linear-gradient(45deg, rgba(255,165,0,0.4), rgba(255,215,0,0.3));
            border-color: #FFD700;
            transform: translateX(10px) scale(1.02);
            box-shadow: 0 10px 30px rgba(255,165,0,0.4);
        }

        h2 {
            color: #FFA500;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            font-size: 28px;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 2px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.8);
            margin-top: auto;
            width: 100%;
            font-size: 14px;
        }

        /* LAPTOP & TABLET (992px and up) */
        @media (min-width: 992px) {
            .sidebar {
                width: 300px;
            }
            .content {
                margin-left: 300px;
                padding: 50px;
            }
            .nav-link {
                font-size: 18px;
                padding: 20px 30px;
            }
            h2 {
                font-size: 32px;
            }
        }

        /* TABLET (768px - 991px) */
        @media (max-width: 991.98px) and (min-width: 768px) {
            .sidebar {
                width: 260px;
            }
            .content {
                margin-left: 260px;
                padding: 30px;
            }
        }

        /* MOBILE LARGE (576px - 767px) */
        @media (max-width: 767.98px) {
            body {
                flex-direction: column;
            }
            
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                padding: 20px;
                margin-bottom: 20px;
            }
            
            .content {
                margin-left: 0;
                padding: 20px;
                order: 2;
            }
            
            h2 {
                font-size: 24px;
                margin-bottom: 25px;
            }
            
            .nav-link {
                font-size: 16px;
                padding: 15px 20px;
                margin-bottom: 12px;
            }
            
            footer {
                order: 3;
            }
        }

        /* MOBILE MEDIUM (375px - 575px) */
        @media (max-width: 575.98px) {
            .content {
                padding: 15px;
            }
            
            h2 {
                font-size: 22px;
            }
            
            .nav-link {
                font-size: 15px;
                padding: 14px 18px;
            }
            
            .sidebar {
                padding: 15px;
            }
        }

        /* MOBILE SMALL (320px and below) */
        @media (max-width: 374.98px) {
            h2 {
                font-size: 20px;
                letter-spacing: 1px;
            }
            
            .nav-link {
                font-size: 14px;
                padding: 12px 15px;
            }
            
            .content {
                padding: 10px;
            }
        }

        /* PERFECT RESPONSIVE IMAGE HANDLING */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            body {
                background-image: url("{% static 'wbc image@2x.jpeg' %}");
            }
        }

        /* PREVENT ZOOM ON INPUT FOCUS (iOS Safari) */
        input, select, textarea {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>WBC<br>Classification<br>Using CNN</h2>
        <nav class="nav flex-column">
            <a class="nav-link home" href="{% url 'index' %}">🏠 Home</a>
            <a class="nav-link user-login" href="{% url 'UserLogin' %}">👤 User Login</a>
            <a class="nav-link admin-login" href="{% url 'AdminLogin' %}">⚙️ Admin Login</a>
            <a class="nav-link create-account" href="{% url 'UserRegisterForm' %}">➕ Create Account</a>
        </nav>
    </div>

    <div class="content">
        {% block contents %}
        {% endblock %}
    </div>

    <footer>
        &copy; 2026 WBC Classification Using CNN | All Rights Reserved
    </footer>

    <!-- Updated CDN Links for Better Performance -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Prevent zoom on double-tap and pinch
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Smooth scroll prevention
        document.addEventListener('wheel', function(e) {
            e.preventDefault();
        }, { passive: false });

        // Dynamic height adjustment
        function adjustLayout() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', adjustLayout);
        adjustLayout();
    </script>
</body>
</html>
